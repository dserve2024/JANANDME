<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JAN&ME Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- HEADER -->
<div class="header">
  <div class="header-inner" style="justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="header-logo">⚙️</div>
      <div>
        <h1>JAN&ME</h1>
        <div class="subtitle">ADMIN PANEL</div>
      </div>
    </div>
    <a href="/" style="background:var(--primary);color:white;border:none;border-radius:var(--r-full);padding:6px 14px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--f-th);white-space:nowrap;text-decoration:none;">🏪 หน้าหลัก</a>
  </div>
</div>

<!-- ADMIN SUB-TABS -->
<div class="tabs">
  <div class="tab" data-tab="users" onclick="switchAdminSubTab('users')">
    <span class="tab-icon">👥</span> Users
  </div>
  <div class="tab active" data-tab="payment" onclick="switchAdminSubTab('payment')">
    <span class="tab-icon">💸</span> โอนเงิน
  </div>
  <div class="tab" data-tab="deposit" onclick="switchAdminSubTab('deposit')">
    <span class="tab-icon">📦</span> มัดจำ
  </div>
  <div class="tab" data-tab="dashboard" onclick="switchAdminSubTab('dashboard')">
    <span class="tab-icon">📊</span> ผลงาน
  </div>
  <div class="tab" data-tab="orders" onclick="switchAdminSubTab('orders')">
    <span class="tab-icon">📋</span> Orders
  </div>
  <div class="tab" data-tab="simulate" onclick="switchAdminSubTab('simulate')">
    <span class="tab-icon">🔍</span> Simulate
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- LOADING -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>กำลังตรวจสอบสิทธิ์...</p>
  </div>

  <!-- ADMIN SECTIONS -->
  <div id="admin-users-sub" class="section" style="display:none;">
    <div class="section-title"><h2>👥 จัดการ Users</h2></div>
    <div id="admin-users-list"></div>
  </div>
  <div id="admin-payment-sub" class="section" style="display:none;">
    <div id="admin-pay-summary"></div>
    <div id="admin-pay-list"></div>
  </div>
  <div id="admin-deposit-sub" class="section" style="display:none;">
    <div id="admin-deposit-list"></div>
  </div>
  <div id="admin-dashboard-sub" class="section" style="display:none;">
    <div id="admin-dashboard-content"></div>
  </div>
  <div id="admin-orders-sub" class="section" style="display:none;">
    <div id="admin-orders-filter"></div>
    <div id="admin-orders-list"></div>
    <div id="admin-orders-pagination"></div>
  </div>
  <div id="admin-simulate-sub" class="section" style="display:none;">
    <div id="admin-simulate-selector"></div>
    <div id="admin-simulate-view"></div>
  </div>

</div>

<!-- CONFIRM PAY MODAL -->
<div class="modal-overlay" id="confirmPayModal">
  <div class="modal confirm-pay-modal" id="confirmPayModalInner">
    <div class="modal-header"><h3 id="cpay-modal-title">✅ ยืนยันโอนเงินคืน</h3></div>
    <div class="modal-body" id="cpay-modal-body" style="padding:16px;max-height:70vh;"></div>
    <div class="modal-actions" id="cpay-modal-actions"></div>
  </div>
</div>

<!-- ADMIN ORDER DETAIL MODAL -->
<div class="modal-overlay" id="adminOrderModal">
  <div class="modal" id="adminOrderModalInner" style="max-width:450px;">
    <div class="modal-header"><h3 id="admin-order-modal-title">📋 Order Detail</h3></div>
    <div class="modal-body" id="admin-order-modal-body" style="padding:16px;max-height:70vh;overflow-y:auto;"></div>
    <div class="modal-actions" id="admin-order-modal-actions"></div>
  </div>
</div>

<!-- Chat Modal -->
<div class="modal-overlay" id="chatModal">
  <div class="modal" style="height:80vh;display:flex;flex-direction:column;">
    <div class="modal-header" style="display:flex;justify-content:space-between;align-items:center;">
      <h3 id="admin-chat-title">💬 แชท</h3>
      <button onclick="closeAdminChat()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--txt3);">✕</button>
    </div>
    <div id="chat-messages" class="chat-thread"></div>
    <div id="admin-chat-image-preview" class="chat-image-preview" style="display:none;">
      <img id="admin-chat-preview-img" src="">
      <button onclick="clearAdminChatImage()" class="chat-preview-close">✕</button>
    </div>
    <div class="chat-input-area">
      <input type="file" id="admin-chat-image-input" accept="image/*" style="display:none" onchange="previewAdminChatImage(this)">
      <button onclick="document.getElementById('admin-chat-image-input').click()" class="chat-img-btn" title="แนบรูป">📷</button>
      <input type="text" id="chat-input" placeholder="พิมพ์ข้อความ..." onkeydown="if(event.key==='Enter')sendAdminChatMsg()">
      <button onclick="sendAdminChatMsg()" class="chat-send-btn">📨</button>
    </div>
  </div>
</div>

<!-- FEE SETTINGS MODAL -->
<div class="modal-overlay" id="feeSettingsModal">
  <div class="modal" style="max-width:340px;">
    <div class="modal-header"><h3>⚙️ ตั้งค่าธรรมเนียม</h3></div>
    <div class="modal-body" style="padding:20px;">
      <label style="font-size:14px;color:var(--txt2);margin-bottom:8px;display:block;">เปอร์เซ็นต์ค่าธรรมเนียม (%)</label>
      <input type="number" id="feeRateInput" min="0" max="100" step="0.1" style="width:100%;padding:12px;font-size:18px;border:1px solid var(--border);border-radius:8px;text-align:center;" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideModal('feeSettingsModal')">ยกเลิก</button>
      <button class="btn-save" onclick="saveFeeRate()">บันทึก</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- LOADING OVERLAY -->
<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-overlay-content">
    <div class="spinner"></div>
    <p id="loadingText">กำลังดำเนินการ...</p>
  </div>
</div>

<script src="app.js"></script>
<script src="admin-app.js"></script>
</body>
</html>
